<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Labborn Monsters</title>
    <style>
        :root {
            --bg: #1a1a1a;
            --card-bg: #2d2d2d;
            --text: #e0e0e0;
            --accent: #4a90e2;
            --beast: #ff6b6b;
            --nature: #51cf66;
            --mech: #fcc419;
            --neutral: #9e9e9e;
            --locked: #555;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        #game-container {
            width: 100vw;
            height: 100vh;
            max-width: 1920px;
            max-height: 1080px;
            aspect-ratio: 16 / 9;
            margin: auto;
            position: relative;
            background: #121212;
            display: flex;
            flex-direction: column;
            border: 4px solid #333;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .screen {
            display: none;
            padding: 15px;
            flex-direction: column;
            width: 100%;
            height: 100%;
            animation: fadeIn 0.3s ease-out;
            overflow-y: auto;
        }

        .monster-art {
            font-size: 40px;
            margin: 10px 0;
            filter: drop-shadow(0 0 5px rgba(255,255,255,0.2));
        }

        .type-container {
            display: flex;
            gap: 4px;
            justify-content: center;
            margin-bottom: 5px;
        }

        .screen.active {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1, h2, h3 {
            text-align: center;
            margin-top: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        button {
            background: var(--accent);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin: 5px 0;
            transition: transform 0.1s, opacity 0.2s;
        }

        button:active {
            transform: scale(0.95);
        }

        button:disabled {
            background: #444;
            opacity: 0.5;
            cursor: not-allowed;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        /* Collection Styles */
        .tabs {
            display: flex;
            margin-bottom: 15px;
        }

        .tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            background: #333;
            cursor: pointer;
            border-bottom: 3px solid transparent;
        }

        .tab.active {
            background: #444;
            border-bottom-color: var(--accent);
        }

        .monster-card {
            background: var(--card-bg);
            border-radius: 10px;
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid #444;
            position: relative;
        }

        .monster-card.locked {
            filter: grayscale(1);
            opacity: 0.6;
        }

        .monster-card .type-tag {
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 4px;
            text-transform: uppercase;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 5px;
        }

        .type-beast { background: var(--beast); color: black; }
        .type-nature { background: var(--nature); color: black; }
        .type-mech { background: var(--mech); color: black; }
        .type-neutral { background: var(--neutral); color: black; }

        .stats-row {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            margin-top: 5px;
        }

        .moves-list {
            margin-top: 8px;
            font-size: 11px;
            color: #aaa;
        }

        /* Run Selection */
        .selection-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }

        .select-slot {
            height: 100px;
            border: 2px dashed #444;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #222;
            cursor: pointer;
        }

        .select-slot.filled {
            border-style: solid;
            border-color: var(--accent);
            background: var(--card-bg);
            flex-direction: column;
        }

        /* Map Styles */
        .map-nodes {
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding: 10px;
        }

        .node {
            padding: 15px;
            background: #333;
            border-radius: 8px;
            text-align: center;
            position: relative;
            opacity: 0.5;
        }

        .node.active {
            opacity: 1;
            border: 2px solid var(--accent);
            background: #444;
        }

        .node.completed {
            opacity: 0.8;
            background: #222;
            text-decoration: line-through;
        }

        /* Combat Styles */
        .combat-header {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            z-index: 100;
            box-sizing: border-box;
        }

        #btn-pause {
            position: absolute;
            left: 20px;
            top: 20px;
            background: rgba(0,0,0,0.5);
            border: 2px solid #fff;
            color: #fff;
            padding: 10px 20px;
            font-size: 18px;
            cursor: pointer;
            border-radius: 8px;
        }

        .turn-order {
            display: flex;
            gap: 10px;
            background: rgba(0,0,0,0.5);
            padding: 10px 20px;
            border-radius: 20px;
        }

        .turn-icon {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 3px solid #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            flex-shrink: 0;
            background: #444;
        }

        .turn-icon.ally { background: #2e7d32; }
        .turn-icon.enemy { background: #c62828; }

        .turn-icon.active {
            border-color: gold;
            transform: scale(1.2);
            box-shadow: 0 0 10px gold;
        }

        .combat-arena {
            width: 100%;
            height: 100%;
            padding-top: 100px;
            padding-bottom: 200px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(180deg, #2a2d34 0%, #1a1c23 100%);
            box-sizing: border-box;
            position: relative;
            overflow: hidden;
        }

        .team {
            width: 40%;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: 40px;
            padding: 0 50px;
            position: relative;
            z-index: 10;
        }

        #player-team {
            direction: rtl;
        }
        #player-team > * {
            direction: ltr;
        }
        #player-team > *:nth-child(3), #player-team > *:nth-child(4) {
            margin-top: 80px;
        }

        #enemy-team {
            direction: ltr;
        }
        #enemy-team > *:nth-child(3), #enemy-team > *:nth-child(4) {
            margin-top: 80px;
        }

        .element-triangle {
            display: none; /* Hide element triangle in compact view */
        }

        .move-btn.beast { border-left: 4px solid var(--beast); }
        .move-btn.nature { border-left: 4px solid var(--nature); }
        .move-btn.mech { border-left: 4px solid var(--mech); }

        .combatant {
            width: 150px;
            text-align: center;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 15px;
        }

        .combatant.dead {
            filter: grayscale(1);
            opacity: 0.3;
        }
        
        .combatant.active-turn .monster-art-container img,
        .combatant.active-turn .monster-art-container div {
            filter: drop-shadow(0 0 8px gold);
        }

        .monster-art-container {
            width: 150px;
            height: 150px;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            margin-bottom: 5px;
        }

        .monster-art-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            position: relative;
            z-index: 2;
        }

        .shadow-ellipse {
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 30px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 50%;
            z-index: 1;
        }

        .stats-container {
            background: rgba(0, 0, 0, 0.6);
            padding: 8px 12px;
            border-radius: 12px;
            width: 100%;
            border: 1px solid #444;
            z-index: 3;
        }

        .combatant .hp-bar {
            width: 100%;
            height: 10px;
            background: #222;
            border-radius: 5px;
            margin-top: 5px;
            overflow: hidden;
        }

        .combatant .hp-fill {
            height: 100%;
            background: #51cf66;
            transition: width 0.3s;
        }

        .combatant .name {
            font-size: 16px;
            font-weight: bold;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: #fff;
        }

        .combat-controls {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 200px;
            background: rgba(0,0,0,0.8);
            border-top: 2px solid #444;
            display: flex;
            padding: 20px;
            box-sizing: border-box;
            gap: 20px;
            align-items: center;
        }

        .energy-display {
            font-size: 24px;
            background: #111;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            color: var(--mech);
            font-weight: bold;
        }

        .move-btn {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 2px solid #555;
            border-radius: 8px;
            background: #222;
            color: white;
            padding: 10px 15px;
            cursor: pointer;
            transition: transform 0.1s;
            font-size: 16px;
        }
        
        .move-btn:hover {
            border-color: #888;
        }

        .move-btn:active {
            transform: scale(0.95);
        }

        .move-btn.beast { border-left-width: 8px; border-left-color: var(--beast); }
        .move-btn.nature { border-left-width: 8px; border-left-color: var(--nature); }
        .move-btn.mech { border-left-width: 8px; border-left-color: var(--mech); }

        .move-cost {
            font-size: 14px;
            background: rgba(0,0,0,0.5);
            padding: 4px 8px;
            border-radius: 10px;
        }

        .combat-log {
            width: 300px;
            height: 100%;
            margin: 0;
            background: #111;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 10px;
            font-size: 12px;
            color: #0f0;
            font-family: monospace;
            overflow-y: auto;
        }

        /* Merge Styles */
        .merge-arena {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .merge-slot {
            width: 120px;
            height: 120px;
            border: 2px dashed #444;
            border-radius: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #222;
        }

        .merge-slot.filled {
            border-style: solid;
            border-color: var(--accent);
            background: var(--card-bg);
            flex-direction: column;
        }

        .merge-plus {
            font-size: 30px;
            font-weight: bold;
        }

        /* Modals */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
            padding: 20px;
        }

        .modal-content {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 15px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #444;
        }

        #modal-notification .modal-content {
            text-align: center;
        }

        #modal-confirm .modal-content {
            text-align: center;
        }

        .confirm-btns {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .confirm-btns button {
            flex: 1;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <!-- Main Menu -->
        <div id="screen-menu" class="screen active">
            <h1>LABBORN MONSTERS</h1>
            <button onclick="showScreen('screen-selection')">START RUN</button>
            <button onclick="openCollection()">COLLECTION</button>
        </div>

        <!-- Collection -->
        <div id="screen-collection" class="screen">
            <h2>COLLECTION</h2>
            <div class="tabs">
                <div id="tab-starters" class="tab active" onclick="switchCollectionTab('starters')">STARTERS</div>
                <div id="tab-merges" class="tab" onclick="switchCollectionTab('merges')">MERGES</div>
            </div>
            <div id="collection-list" style="flex: 1; overflow-y: auto;"></div>
            <button onclick="showScreen('screen-menu')">BACK</button>
        </div>

        <!-- Selection -->
        <div id="screen-selection" class="screen">
            <h2>SELECT 2 STARTERS</h2>
            <div class="selection-container">
                <div id="slot-0" class="select-slot" onclick="openSelectionModal(0)">+</div>
                <div id="slot-1" class="select-slot" onclick="openSelectionModal(1)">+</div>
            </div>
            <div id="selection-list" style="flex: 1; overflow-y: auto;"></div>
            <button id="btn-start-run" disabled onclick="startRun()">ENTER MAP</button>
            <button onclick="showScreen('screen-menu')">BACK</button>
        </div>

        <!-- Map -->
        <div id="screen-map" class="screen">
            <h2>THE RUN</h2>
            <div id="map-nodes" class="map-nodes"></div>
            <button id="btn-continue-node" onclick="proceedToNode()">CONTINUE</button>
        </div>

        <!-- Combat -->
        <div id="screen-combat" class="screen" style="padding: 0;">
            <div class="combat-header">
                <button id="btn-pause" onclick="openPauseModal()">⏸</button>
                <div id="turn-order" class="turn-order"></div>
            </div>
            <div class="combat-arena">
                <div id="player-team" class="team"></div>
                <div id="enemy-team" class="team"></div>
            </div>
            <div class="combat-controls">
                <div id="combat-log" class="combat-log"></div>
                <div class="moves-wrapper" style="flex: 1; display: flex; flex-direction: column; height: 100%;">
                    <div id="active-unit-info" style="font-size:14px; font-weight:bold; margin-bottom: 10px; color: #fff;"></div>
                    <div id="move-controls" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; flex: 1;"></div>
                </div>
                <div class="controls-right" style="width: 150px; display: flex; flex-direction: column; gap: 10px; height: 100%;">
                    <div id="energy-display" class="energy-display">EN: 0</div>
                    <button id="btn-end-turn" onclick="advanceTurn()" style="flex: 1; background: #d97706; border: none; font-size: 20px; cursor: pointer; border-radius: 8px; font-weight: bold; color: white;">END TURN</button>
                </div>
            </div>
        </div>

        <!-- Merge -->
        <div id="screen-merge" class="screen">
            <h2>THE LAB MERGE</h2>
            <p style="text-align: center; font-size: 14px;">Select two monsters to fuse.</p>
            <div class="merge-arena">
                <div id="merge-slot-0" class="merge-slot" onclick="openMergeModal(0)">+</div>
                <div class="merge-plus">+</div>
                <div id="merge-slot-1" class="merge-slot" onclick="openMergeModal(1)">+</div>
            </div>
            <div id="merge-result" style="margin-top: 20px; text-align: center; font-weight: bold;"></div>
            <button id="btn-do-merge" disabled onclick="executeMerge()">FUSE</button>
            <button onclick="finishMerge()">SKIP / FINISH</button>
        </div>

        <!-- Modals -->
        <div id="modal-pause" class="modal">
            <div class="modal-content">
                <h3 style="margin-top:0">PAUSE MENU</h3>
                <div style="display: flex; flex-direction: column; gap: 10px;">
                    <button onclick="closeModal('modal-pause')">RESUME</button>
                    <button onclick="abandonRun()" style="background: #d32f2f;">ABANDON RUN</button>
                </div>
            </div>
        </div>

        <div id="modal-selection" class="modal">
            <div class="modal-content">
                <h3 id="modal-title">Select Monster</h3>
                <div id="modal-list" style="max-height: 300px; overflow-y: auto;"></div>
                <button onclick="closeModal('modal-selection')" style="width:100%">CLOSE</button>
            </div>
        </div>

        <div id="modal-notification" class="modal">
            <div class="modal-content">
                <h3 id="notif-title">Notice</h3>
                <p id="notif-message"></p>
                <button onclick="closeModal('modal-notification')" style="width:100%">OK</button>
            </div>
        </div>

        <div id="modal-confirm" class="modal">
            <div class="modal-content">
                <h3 id="confirm-title">Confirm</h3>
                <p id="confirm-message"></p>
                <div class="confirm-btns">
                    <button id="confirm-yes">YES</button>
                    <button id="confirm-no">NO</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- DATA ---
        let ELEMENTS = {};
        let STARTERS = {};
        let MERGES = [];
        let BOSSES = {};

        // --- STATE ---
        let gameState = {
            unlockedStarters: ['wolf', 'slime'],
            discoveredMerges: []
        };

        let currentRun = {
            party: [],
            nodeIndex: 0,
            nodes: [],
            energy: 0,
            turnOrder: [],
            activeTurnIndex: 0
        };

        let selectionSlots = [null, null];
        let mergeSlots = [null, null];

        // --- CORE LOGIC ---
        async function init() {
            try {
                const response = await fetch('/data.json');
                const data = await response.json();
                ELEMENTS = data.ELEMENTS;
                STARTERS = data.STARTERS;
                MERGES = data.MERGES;
                BOSSES = data.BOSSES;
            } catch (e) {
                console.error("Failed to load game data", e);
            }

            const saved = localStorage.getItem('labborn_save');
            if (saved) {
                gameState = JSON.parse(saved);
            }
            showScreen('screen-menu');
        }

        function saveGame() {
            localStorage.setItem('labborn_save', JSON.stringify(gameState));
        }

        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
            
            if (screenId === 'screen-selection') {
                selectionSlots = [null, null];
                updateSelectionUI();
            }
        }

        // --- COLLECTION ---
        let currentCollectionTab = 'starters';
        function openCollection() {
            showScreen('screen-collection');
            switchCollectionTab('starters');
        }

        function switchCollectionTab(tab) {
            currentCollectionTab = tab;
            document.getElementById('tab-starters').classList.toggle('active', tab === 'starters');
            document.getElementById('tab-merges').classList.toggle('active', tab === 'merges');
            renderCollection();
        }

        function renderArt(art, size = 40) {
            if (art.includes('.png') || art.includes('/')) {
                return `<img src="${art}" style="max-width:100%; max-height:100%; object-fit:contain;" />`;
            }
            return `<div style="font-size:${size}px; line-height:1;">${art}</div>`;
        }

        function renderCollection() {
            const list = document.getElementById('collection-list');
            list.innerHTML = '';

            if (currentCollectionTab === 'starters') {
                Object.values(STARTERS).forEach(s => {
                    const unlocked = gameState.unlockedStarters.includes(s.id);
                    const card = document.createElement('div');
                    card.className = `monster-card ${unlocked ? '' : 'locked'}`;
                    card.innerHTML = `
                        <div class="type-container">
                            <div class="type-tag type-${s.type.toLowerCase()}">${s.type}</div>
                        </div>
                        <div class="monster-art" style="height:60px; display:flex; justify-content:center; align-items:center;">${renderArt(s.art)}</div>
                        <strong>${s.name}</strong>
                        ${unlocked ? `
                            <div class="stats-row">
                                <span>HP: ${s.hp}</span>
                                <span>ATK: ${s.atk}</span>
                                <span>SPD: ${s.spd}</span>
                            </div>
                            <div class="moves-list">${s.moves.map(m => `${m.n}(${m.c})`).join(', ')}</div>
                        ` : '<div style="margin-top:10px">LOCKED</div>'}
                    `;
                    list.appendChild(card);
                });
            } else {
                MERGES.forEach(m => {
                    const discovered = gameState.discoveredMerges.includes(m.name);
                    const card = document.createElement('div');
                    card.className = `monster-card ${discovered ? '' : 'locked'}`;
                    
                    if (discovered) {
                        const p1 = STARTERS[m.parents[0]];
                        const p2 = STARTERS[m.parents[1]];
                        const types = [...new Set([
                            ...(Array.isArray(p1.type) ? p1.type : [p1.type]),
                            ...(Array.isArray(p2.type) ? p2.type : [p2.type])
                        ])];
                        const moves = m.moves || [];
                        card.innerHTML = `
                            <div class="type-container">
                                ${types.map(t => `<div class="type-tag type-${t.toLowerCase()}">${t}</div>`).join('')}
                            </div>
                            <div class="monster-art" style="height:60px; display:flex; justify-content:center; align-items:center;">${renderArt(m.art)}</div>
                            <strong>${m.name}</strong>
                            <div style="font-size:10px; color:#888">${p1.name} + ${p2.name}</div>
                            <div class="stats-row">
                                <span>HP: ${m.hp}</span>
                                <span>ATK: ${m.atk}</span>
                                <span>SPD: ${m.spd}</span>
                            </div>
                            <div class="moves-list">${moves.map(mv => `${mv.n}(${mv.c})`).join(', ')}</div>
                        `;
                    } else {
                        card.innerHTML = `<strong>???</strong><div style="margin-top:10px">NOT DISCOVERED</div>`;
                    }
                    list.appendChild(card);
                });
            }
        }

        // --- RUN SELECTION ---
        function updateSelectionUI() {
            selectionSlots.forEach((s, i) => {
                const slot = document.getElementById(`slot-${i}`);
                if (s) {
                    slot.classList.add('filled');
                    slot.innerHTML = `
                        <div style="height:50px; display:flex; justify-content:center; align-items:center; margin-bottom:5px;">${renderArt(s.art, 30)}</div>
                        <strong>${s.name}</strong><span style="font-size:10px">${s.type}</span>
                    `;
                } else {
                    slot.classList.remove('filled');
                    slot.innerHTML = '+';
                }
            });
            document.getElementById('btn-start-run').disabled = selectionSlots.includes(null);
        }

        function openSelectionModal(slotIndex) {
            const modal = document.getElementById('modal-selection');
            const list = document.getElementById('modal-list');
            document.getElementById('modal-title').innerText = "Select Starter";
            list.innerHTML = '';
            
            gameState.unlockedStarters.forEach(id => {
                const s = STARTERS[id];
                const btn = document.createElement('button');
                btn.style.width = '100%';
                btn.innerHTML = `${s.name} (${s.type})`;
                btn.onclick = () => {
                    selectionSlots[slotIndex] = JSON.parse(JSON.stringify(s));
                    updateSelectionUI();
                    closeModal('modal-selection');
                };
                list.appendChild(btn);
            });
            modal.style.display = 'flex';
        }

        function closeModal(id) {
            document.getElementById(id).style.display = 'none';
        }

        function showGameAlert(title, message, onDone) {
            document.getElementById('notif-title').innerText = title;
            document.getElementById('notif-message').innerText = message;
            const modal = document.getElementById('modal-notification');
            const btn = modal.querySelector('button');
            btn.onclick = () => {
                closeModal('modal-notification');
                if (onDone) onDone();
            };
            modal.style.display = 'flex';
        }

        function showGameConfirm(title, message, onYes, onNo) {
            document.getElementById('confirm-title').innerText = title;
            document.getElementById('confirm-message').innerText = message;
            const modal = document.getElementById('modal-confirm');
            const yesBtn = document.getElementById('confirm-yes');
            const noBtn = document.getElementById('confirm-no');
            
            yesBtn.onclick = () => {
                closeModal('modal-confirm');
                if (onYes) onYes();
            };
            noBtn.onclick = () => {
                closeModal('modal-confirm');
                if (onNo) onNo();
            };
            modal.style.display = 'flex';
        }

        // --- RUN ENGINE ---
        function startRun() {
            currentRun.party = selectionSlots.map(s => ({ ...s, currentHp: s.hp }));
            currentRun.nodeIndex = 0;
            currentRun.nodes = [
                { type: 'combat', level: 0 }, // Node 1: 1 enemy (Simple)
                { type: 'combat', level: 0 }, // Node 2: 1 enemy (Simple)
                { type: 'merge' },            // Node 3: Merge
                { type: 'combat', level: 1 }, // Node 4: 2 enemies (Simple)
                { type: 'combat', level: 2 }, // Node 5: 2 enemies (Advanced)
                { type: 'combat', level: 2 }, // Node 6: Combat
                { type: 'merge' },            // Node 7: Merge
                { type: 'combat', level: 3 }, // Node 8: Combat
                { type: 'combat', level: 3 }, // Node 9: Combat
                { type: 'boss' }              // Node 10: Boss
            ];
            showScreen('screen-map');
            renderMap();
        }

        function renderMap() {
            const container = document.getElementById('map-nodes');
            container.innerHTML = '';
            currentRun.nodes.forEach((n, i) => {
                const div = document.createElement('div');
                div.className = `node ${i === currentRun.nodeIndex ? 'active' : ''} ${i < currentRun.nodeIndex ? 'completed' : ''}`;
                div.innerText = `Node ${i + 1}: ${n.type.toUpperCase()}`;
                container.appendChild(div);
            });
            document.getElementById('btn-continue-node').disabled = currentRun.nodeIndex >= currentRun.nodes.length;
        }

        function proceedToNode() {
            const node = currentRun.nodes[currentRun.nodeIndex];
            if (node.type === 'combat' || node.type === 'boss') {
                initCombat(node);
            } else if (node.type === 'merge') {
                initMerge();
            }
        }

        // --- COMBAT ENGINE ---
        let combatState = {
            enemies: [],
            log: [],
            isPlayerTurn: false,
            activeUnit: null,
            targetingMove: null,
            firstKilledEnemy: null,
            turnJustStarted: true
        };

        function initCombat(node) {
            showScreen('screen-combat');
            combatState.log = ["Combat Started!"];
            combatState.targetingMove = null;
            combatState.firstKilledEnemy = null;
            combatState.turnJustStarted = true;
            
            // Generate Enemies
            let enemyCount = node.type === 'boss' ? 1 : Math.min(3, node.level + 1);
            if (currentRun.nodeIndex < 2) enemyCount = 1; // Node 1 & 2 only 1 enemy
            if (currentRun.nodeIndex === 3) enemyCount = 2; // Node 4: 2 enemies
            if (currentRun.nodeIndex === 4) enemyCount = 2; // Node 5: 2 enemies

            combatState.enemies = [];
            
            // Define pools
            const simplePool = ['wolf', 'slime', 'sentry'];
            const advancedPool = ['bear', 'mushroom', 'sparkbot'];
            const allPool = [...simplePool, ...advancedPool];

            let pool = allPool;
            if (currentRun.nodeIndex <= 3) pool = simplePool; // Nodes 1, 2, 4
            else if (currentRun.nodeIndex === 4) pool = advancedPool; // Node 5

            if (node.type === 'boss') {
                const base = BOSSES['boss'];
                const enemyHp = base.hp;
                const enemyAtk = base.atk;
                combatState.enemies.push({
                    ...base,
                    baseId: base.id,
                    hp: enemyHp,
                    currentHp: enemyHp,
                    atk: enemyAtk,
                    isEnemy: true,
                    id: `enemy-${Date.now()}-boss`,
                    energy: 1,
                    atkMod: 0,
                    spdMod: 0,
                    defMod: 1.0,
                    buffs: [],
                    stunned: false,
                    poison: 0
                });
            } else {
                for (let i = 0; i < enemyCount; i++) {
                    const key = pool[Math.floor(Math.random() * pool.length)];
                    const base = STARTERS[key];
                    
                    // Base multiplier for node level
                    const levelMult = 0.8 + (node.level * 0.2);
                    
                    // User wants enemies to be 20% WEAKER than player monsters.
                    // We'll use the base stats * levelMult * 0.8 to ensure they are always 20% weaker than a "standard" version of themselves at that level.
                    const enemyHp = Math.floor(base.hp * levelMult * 0.8);
                    const enemyAtk = Math.floor(base.atk * levelMult * 0.8);

                    combatState.enemies.push({
                        ...base,
                        baseId: base.id, // Keep track of base ID for recruitment
                        hp: enemyHp,
                        currentHp: enemyHp,
                        atk: enemyAtk,
                        isEnemy: true,
                        id: `enemy-${Date.now()}-${i}`,
                        energy: 1,
                        atkMod: 0,
                        spdMod: 0,
                        defMod: 1.0,
                        buffs: [],
                        stunned: false,
                        poison: 0
                    });
                }
            }

            // Reset player energy and mods
            currentRun.party.forEach(p => {
                p.energy = 1;
                p.atkMod = 0;
                p.spdMod = 0;
                p.defMod = 1.0;
                p.buffs = [];
                p.stunned = false;
                p.poison = 0;
            });

            calculateTurnOrder();
            updateCombatUI();
            nextTurn();
        }
        function calculateTurnOrder() {
            const all = [...currentRun.party, ...combatState.enemies].filter(u => u.currentHp > 0);
            all.sort((a, b) => b.spd - a.spd);
            currentRun.turnOrder = all;
            currentRun.activeTurnIndex = 0;
        }

        function updateCombatUI() {
            const unit = currentRun.turnOrder[currentRun.activeTurnIndex];
            if (!unit) return;

            const enemyTeam = document.getElementById('enemy-team');
            const playerTeam = document.getElementById('player-team');
            enemyTeam.innerHTML = '';
            playerTeam.innerHTML = '';

            combatState.enemies.forEach(e => enemyTeam.appendChild(createCombatantEl(e)));
            currentRun.party.forEach(p => playerTeam.appendChild(createCombatantEl(p)));

            const turnOrderEl = document.getElementById('turn-order');
            turnOrderEl.innerHTML = '';
            currentRun.turnOrder.forEach((u, i) => {
                if (u.currentHp <= 0) return;
                const div = document.createElement('div');
                const isAlly = !u.isEnemy;
                div.className = `turn-icon ${isAlly ? 'ally' : 'enemy'} ${i === currentRun.activeTurnIndex ? 'active' : ''}`;
                div.innerHTML = renderArt(u.art, 30);
                div.title = u.name;
                turnOrderEl.appendChild(div);
            });

            const energy = unit.energy;
            document.getElementById('energy-display').innerText = `EN: ${energy}`;
            document.getElementById('combat-log').innerHTML = combatState.log.slice(-5).join('<br>');
            
            const infoEl = document.getElementById('active-unit-info');
            if (combatState.activeUnit && !combatState.activeUnit.isEnemy) {
                const types = Array.isArray(combatState.activeUnit.type) ? combatState.activeUnit.type : [combatState.activeUnit.type];
                infoEl.innerHTML = `${combatState.activeUnit.name} (${types.join('/')})`;
            } else {
                infoEl.innerHTML = '';
            }
        }

        function createCombatantEl(u) {
            const div = document.createElement('div');
            const isTargetable = combatState.targetingMove && u.isEnemy && u.currentHp > 0;
            div.className = `combatant ${u.currentHp <= 0 ? 'dead' : ''} ${isTargetable ? 'targetable' : ''}`;
            const hpPerc = Math.max(0, (u.currentHp / u.hp) * 100);
            const types = Array.isArray(u.type) ? u.type : [u.type];
            
            let artHtml = '';
            if (u.art.includes('.png') || u.art.includes('/')) {
                artHtml = `<img src="${u.art}" alt="${u.name}" />`;
            } else {
                artHtml = `<div style="font-size:100px; position:relative; z-index:2; line-height:1;">${u.art}</div>`;
            }

            div.innerHTML = `
                <div class="type-container" style="position:absolute; top:-15px; left:50%; transform:translateX(-50%); z-index:3;">
                    ${types.map(t => `<div class="type-tag type-${t.toLowerCase()}" style="font-size:8px; padding:2px 4px;">${t}</div>`).join('')}
                </div>
                <div class="monster-art-container">
                    ${artHtml}
                    <div class="shadow-ellipse"></div>
                </div>
                <div class="stats-container">
                    <div class="name">Lv.1 ${u.name}</div>
                    <div class="hp-bar"><div class="hp-fill" style="width:${hpPerc}%"></div></div>
                    <div style="font-size:8px; color:#ccc; margin-top:2px;">${u.currentHp}/${u.hp}</div>
                </div>
            `;
            if (u === combatState.activeUnit) div.classList.add('active-turn');
            
            if (isTargetable) {
                div.onclick = () => executeMove(combatState.activeUnit, combatState.targetingMove, u);
            }
            return div;
        }

        async function nextTurn() {
            // Check win/loss
            if (combatState.enemies.every(e => e.currentHp <= 0)) {
                combatLog("Victory!");
                setTimeout(endCombat, 1500, true);
                return;
            }
            if (currentRun.party.every(p => p.currentHp <= 0)) {
                combatLog("Defeat...");
                setTimeout(() => showScreen('screen-menu'), 2000);
                return;
            }

            const unit = currentRun.turnOrder[currentRun.activeTurnIndex];
            if (!unit || unit.currentHp <= 0) {
                advanceTurn();
                return;
            }

            if (unit.stunned) {
                combatLog(`${unit.name} is stunned and skips their turn!`);
                unit.stunned = false;
                setTimeout(advanceTurn, 1000);
                return;
            }

            combatState.activeUnit = unit;
            updateCombatUI();

            if (!unit.isEnemy) {
                combatState.isPlayerTurn = true;
                renderMoveControls(unit);
            } else {
                combatState.isPlayerTurn = false;
                document.getElementById('move-controls').innerHTML = '';
                await new Promise(r => setTimeout(r, 1000));
                enemyAI(unit);
            }
        }

        function advanceTurn() {
            const unit = currentRun.turnOrder[currentRun.activeTurnIndex];
            if (unit && unit.currentHp > 0) {
                unit.energy = Math.min(3, unit.energy + 1);
                
                // Decay buffs
                if (unit.buffs) {
                    unit.buffs.forEach(b => b.turns--);
                    unit.buffs = unit.buffs.filter(b => b.turns > 0);
                    
                    // Recalculate mods
                    unit.atkMod = 0;
                    unit.spdMod = 0;
                    unit.defMod = 1.0;
                    unit.buffs.forEach(b => {
                        if (b.type === 'atk_buff') unit.atkMod += b.value;
                        if (b.type === 'spd_buff') unit.spdMod += b.value;
                        if (b.type === 'def_buff') unit.defMod *= b.value;
                    });
                }

                // Poison
                if (unit.poison > 0) {
                    const dmg = unit.poison;
                    unit.currentHp -= dmg;
                    combatLog(`${unit.name} took ${dmg} poison damage!`);
                    if (unit.currentHp <= 0) {
                        combatLog(`${unit.name} fainted from poison!`);
                        if (!unit.isEnemy) {
                            currentRun.party = currentRun.party.filter(p => p.currentHp > 0);
                        }
                        calculateTurnOrder(); // Refresh order if someone died
                    }
                }
            }
            currentRun.activeTurnIndex = (currentRun.activeTurnIndex + 1) % currentRun.turnOrder.length;
            combatState.turnJustStarted = true;
            nextTurn();
        }

        function renderMoveControls(unit) {
            const container = document.getElementById('move-controls');
            container.innerHTML = '';
            
            const currentEnergy = unit.energy;

            unit.moves.forEach(m => {
                const btn = document.createElement('button');
                btn.className = `move-btn ${m.t.toLowerCase()}`;
                const isTargetingThis = combatState.targetingMove === m;
                if (isTargetingThis) btn.style.background = 'gold';
                
                btn.disabled = currentEnergy < m.c;
                btn.innerHTML = `
                    <div style="display:flex; flex-direction:column; align-items:flex-start">
                        <span style="font-weight:bold">${m.n}</span>
                        <span style="font-size:9px; opacity:0.8">${m.t}</span>
                    </div>
                    <span class="move-cost">${m.c} EN</span>
                `;
                btn.onclick = () => {
                    if (m.n.includes('Heal') || m.n.includes('Guard') || m.n.includes('Howl') || m.n.includes('Overcharge')) {
                        executeMove(unit, m, unit);
                    } else {
                        combatState.targetingMove = m;
                        combatLog("Select a target!");
                        updateCombatUI();
                        renderMoveControls(unit);
                    }
                };
                container.appendChild(btn);
            });
        }

        function executeMove(attacker, move, target) {
            if (attacker.energy < move.c) return;
            attacker.energy -= move.c;
            combatState.targetingMove = null;

            if (move.effect) {
                const eff = move.effect;
                if (eff.type === 'atk_buff' || eff.type === 'spd_buff' || eff.type === 'def_buff') {
                    attacker.buffs.push({ ...eff });
                    // Apply immediately
                    if (eff.type === 'atk_buff') attacker.atkMod += eff.value;
                    if (eff.type === 'spd_buff') attacker.spdMod += eff.value;
                    if (eff.type === 'def_buff') attacker.defMod *= eff.value;
                    combatLog(`${attacker.name} used ${move.n} and boosted stats!`);
                } else if (eff.type === 'heal') {
                    // Handled below if name contains Heal, but let's make it generic
                }
            }

            if (move.n.includes('Heal')) {
                const amount = Math.floor((attacker.atk + attacker.atkMod) * 1.5 * (move.p || 1.0));
                attacker.currentHp = Math.min(attacker.hp, attacker.currentHp + amount);
                combatLog(`${attacker.name} used ${move.n} and healed ${amount}!`);
            } else if (move.n.includes('Guard') || move.n.includes('Howl') || move.n.includes('Overcharge')) {
                // Buffs handled above by move.effect
                if (!move.effect) combatLog(`${attacker.name} used ${move.n}! (Buffed)`);
            } else {
                // If no target provided (e.g. enemy AI), pick random
                if (!target) {
                    const targets = attacker.isEnemy ? currentRun.party : combatState.enemies;
                    const aliveTargets = targets.filter(t => t.currentHp > 0);
                    if (aliveTargets.length > 0) {
                        target = aliveTargets[Math.floor(Math.random() * aliveTargets.length)];
                    }
                }

                if (target) {
                    const damage = calculateDamage(attacker, move, target);
                    target.currentHp -= damage;
                    combatLog(`${attacker.name} used ${move.n} on ${target.name} for ${damage}!`);
                    
                    // Apply target effects
                    if (move.effect) {
                        const eff = move.effect;
                        if (eff.type === 'stun' && Math.random() < eff.chance) {
                            target.stunned = true;
                            combatLog(`${target.name} was stunned!`);
                        }
                        if (eff.type === 'poison') {
                            target.poison = eff.value;
                            combatLog(`${target.name} was poisoned!`);
                        }
                    }

                    if (target.currentHp <= 0) {
                        if (target.isEnemy && !combatState.firstKilledEnemy) {
                            combatState.firstKilledEnemy = target;
                        } else if (!target.isEnemy) {
                            combatLog(`${target.name} has fallen!`);
                            currentRun.party = currentRun.party.filter(p => p.currentHp > 0);
                            calculateTurnOrder();
                        }
                    }
                }
            }

            updateCombatUI();
            
            // If enemy, check if can move again
            if (attacker.isEnemy) {
                setTimeout(() => enemyAI(attacker), 800);
            } else {
                // For player, just re-render controls
                renderMoveControls(attacker);
                // Check if enemies all dead
                if (combatState.enemies.every(e => e.currentHp <= 0)) {
                    setTimeout(nextTurn, 500);
                }
            }
        }

        function calculateDamage(attacker, move, target) {
            const moveType = move.t;
            const targetTypes = Array.isArray(target.type) ? target.type : [target.type];

            let maxMult = 1;
            targetTypes.forEach(bt => {
                let currentMult = 1;
                if (moveType === ELEMENTS.BEAST && bt === ELEMENTS.NATURE) currentMult = 2;
                if (moveType === ELEMENTS.NATURE && bt === ELEMENTS.MECH) currentMult = 2;
                if (moveType === ELEMENTS.MECH && bt === ELEMENTS.BEAST) currentMult = 2;

                if (moveType === ELEMENTS.NATURE && bt === ELEMENTS.BEAST) currentMult = 0.5;
                if (moveType === ELEMENTS.MECH && bt === ELEMENTS.NATURE) currentMult = 0.5;
                if (moveType === ELEMENTS.BEAST && bt === ELEMENTS.MECH) currentMult = 0.5;
                
                if (currentMult > maxMult) maxMult = currentMult;
            });

            let finalDamage = (attacker.atk + (attacker.atkMod || 0)) * maxMult * (move.p || 1.0) * (target.defMod || 1.0);
            return Math.floor(finalDamage);
        }

        function enemyAI(unit) {
            // Check if win/loss already
            if (combatState.enemies.every(e => e.currentHp <= 0) || currentRun.party.every(p => p.currentHp <= 0)) return;

            const affordableMoves = unit.moves.filter(m => m.c <= unit.energy);
            
            // AI logic: 
            // 1. If low energy (1), 60% chance to save energy and end turn
            if (unit.energy <= 1 && Math.random() < 0.6) {
                combatLog(`${unit.name} is waiting...`);
                setTimeout(advanceTurn, 800);
                return;
            }

            if (affordableMoves.length > 0) {
                // Pick a move
                affordableMoves.sort((a, b) => b.c - a.c);
                const move = Math.random() < 0.7 ? affordableMoves[0] : affordableMoves[Math.floor(Math.random() * affordableMoves.length)];
                executeMove(unit, move);
            } else {
                // No moves affordable, end turn
                setTimeout(advanceTurn, 800);
            }
        }

        function combatLog(msg) {
            combatState.log.push(msg);
            updateCombatUI();
        }

        function endCombat(isWin) {
            if (isWin) {
                // Recruitment
                if (combatState.firstKilledEnemy) {
                    const e = combatState.firstKilledEnemy;
                    const isStarter = Object.keys(STARTERS).includes(e.baseId);
                    const isAlpha = e.name.includes('Alpha');
                    
                    if (isStarter && !isAlpha) {
                        const base = STARTERS[e.baseId];
                        const recruit = { 
                            ...base, 
                            isEnemy: false, 
                            currentHp: base.hp, // FULL HP
                            hp: base.hp,
                            atk: base.atk
                        };
                        
                        if (currentRun.party.length < 4) {
                            currentRun.party.push(recruit);
                            // Unlock in collection
                            if (!gameState.unlockedStarters.includes(recruit.id)) {
                                gameState.unlockedStarters.push(recruit.id);
                                saveGame();
                            }
                            showGameAlert("Recruitment", `Defeated ${recruit.name} joined your party and is now unlocked in your Collection!`, advanceRun);
                            return;
                        } else {
                            showGameConfirm("Recruitment", `Your party is full. Replace a monster with ${recruit.name}? (This will also unlock it in your Collection)`, 
                                () => openReplacementModal(recruit), 
                                advanceRun
                            );
                            return;
                        }
                    }
                }
                advanceRun();
            }
        }

        function openReplacementModal(recruit) {
            const modal = document.getElementById('modal-selection');
            const list = document.getElementById('modal-list');
            document.getElementById('modal-title').innerText = "Select to Replace";
            list.innerHTML = '';
            
            currentRun.party.forEach((m, idx) => {
                const btn = document.createElement('button');
                btn.style.width = '100%';
                btn.innerHTML = `Replace ${m.name}`;
                btn.onclick = () => {
                    currentRun.party[idx] = recruit;
                    // Unlock in collection
                    if (!gameState.unlockedStarters.includes(recruit.id)) {
                        gameState.unlockedStarters.push(recruit.id);
                        saveGame();
                    }
                    closeModal('modal-selection');
                    advanceRun();
                };
                list.appendChild(btn);
            });
            modal.style.display = 'flex';
        }

        function advanceRun() {
            currentRun.nodeIndex++;
            if (currentRun.nodeIndex >= currentRun.nodes.length) {
                // Victory Run
                const allStarterIds = Object.keys(STARTERS);
                const locked = allStarterIds.filter(id => !gameState.unlockedStarters.includes(id));
                if (locked.length > 0) {
                    const newId = locked[Math.floor(Math.random() * locked.length)];
                    gameState.unlockedStarters.push(newId);
                    alert(`RUN COMPLETE! Unlocked new starter: ${STARTERS[newId].name}`);
                } else {
                    alert(`RUN COMPLETE! All starters already unlocked.`);
                }
                saveGame();
                showScreen('screen-menu');
            } else {
                showScreen('screen-map');
                renderMap();
            }
        }

        // --- MERGE ENGINE ---
        function initMerge() {
            showScreen('screen-merge');
            mergeSlots = [null, null];
            updateMergeUI();
        }

        function updateMergeUI() {
            mergeSlots.forEach((s, i) => {
                const slot = document.getElementById(`merge-slot-${i}`);
                if (s) {
                    slot.classList.add('filled');
                    slot.innerHTML = `<strong>${s.name}</strong>`;
                } else {
                    slot.classList.remove('filled');
                    slot.innerHTML = '+';
                }
            });
            document.getElementById('btn-do-merge').disabled = mergeSlots.includes(null);
            document.getElementById('merge-result').innerText = '';
        }

        function openMergeModal(slotIndex) {
            const modal = document.getElementById('modal-selection');
            const list = document.getElementById('modal-list');
            document.getElementById('modal-title').innerText = "Select to Merge";
            list.innerHTML = '';
            
            currentRun.party.forEach((m, idx) => {
                if (mergeSlots.includes(m) || m.currentHp <= 0) return; // Hide dead monsters
                const btn = document.createElement('button');
                btn.style.width = '100%';
                btn.innerHTML = `${m.name} (HP: ${m.currentHp}/${m.hp})`;
                btn.onclick = () => {
                    mergeSlots[slotIndex] = m;
                    updateMergeUI();
                    closeModal('modal-selection');
                };
                list.appendChild(btn);
            });
            modal.style.display = 'flex';
        }

        function executeMerge() {
            const p1 = mergeSlots[0];
            const p2 = mergeSlots[1];
            
            // Find merge outcome
            const outcome = MERGES.find(m => 
                (m.parents[0] === p1.id && m.parents[1] === p2.id) ||
                (m.parents[0] === p2.id && m.parents[1] === p1.id)
            );

            if (outcome) {
                const types = [...new Set([
                    ...(Array.isArray(p1.type) ? p1.type : [p1.type]),
                    ...(Array.isArray(p2.type) ? p2.type : [p2.type])
                ])];

                const newMonster = {
                    ...outcome,
                    id: outcome.name.toLowerCase().replace(' ', ''),
                    type: types, // Inherit both parent types
                    currentHp: outcome.hp,
                    moves: outcome.moves || []
                };

                // Remove parents, add child
                currentRun.party = currentRun.party.filter(m => m !== p1 && m !== p2);
                currentRun.party.push(newMonster);

                if (!gameState.discoveredMerges.includes(outcome.name)) {
                    gameState.discoveredMerges.push(outcome.name);
                    saveGame();
                }

                showGameAlert("Fusion Success", `Fused into ${outcome.name}!`, () => {
                    updateMergeUI();
                });
            } else {
                showGameAlert("Fusion Error", "These monsters cannot merge!");
            }
        }

        function finishMerge() {
            currentRun.nodeIndex++;
            showScreen('screen-map');
            renderMap();
        }

        // --- PAUSE & ABANDON ---
        function openPauseModal() {
            document.getElementById('modal-pause').style.display = 'flex';
        }

        function abandonRun() {
            closeModal('modal-pause');
            showGameConfirm("Abandon Run", "Are you sure you want to abandon the run? All progress will be lost.", () => {
                showScreen('screen-menu');
            });
        }

        // Start
        init();
    </script>
</body>
</html>
