<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Labborn Monsters</title>
        <link rel="stylesheet" href="/src/styles.css">

</head>
<body>
    <div id="game-container">
        <!-- Main Menu -->
        <div id="screen-menu" class="screen active">
            <h1>LABBORN MONSTERS</h1>
            <button onclick="showScreen('screen-selection')">START RUN</button>
            <button onclick="openCollection()">COLLECTION</button>
        </div>

        <!-- Collection -->
        <div id="screen-collection" class="screen">
            <h2>COLLECTION</h2>
            <div class="tabs">
                <div id="tab-starters" class="tab active" onclick="switchCollectionTab('starters')">STARTERS</div>
                <div id="tab-merges" class="tab" onclick="switchCollectionTab('merges')">MERGES</div>
            </div>
            <div id="collection-list" style="flex: 1; overflow-y: auto;"></div>
            <button onclick="showScreen('screen-menu')">BACK</button>
        </div>

        <!-- Selection -->
        <div id="screen-selection" class="screen">
            <h2>SELECT 2 STARTERS</h2>
            <div class="selection-container">
                <div id="slot-0" class="select-slot" onclick="openSelectionModal(0)">+</div>
                <div id="slot-1" class="select-slot" onclick="openSelectionModal(1)">+</div>
            </div>
            <div id="selection-list" style="flex: 1; overflow-y: auto;"></div>
            <button id="btn-start-run" disabled onclick="startRun()">ENTER MAP</button>
            <button onclick="showScreen('screen-menu')">BACK</button>
        </div>

        <!-- Map -->
        <div id="screen-map" class="screen">
            <h2>THE RUN</h2>
            <div id="map-nodes" class="map-nodes"></div>
            <button id="btn-continue-node" onclick="proceedToNode()">CONTINUE</button>
        </div>

        <!-- Combat -->
        <div id="screen-combat" class="screen" style="padding: 0;">
            <div class="combat-header">
                <button id="btn-pause" onclick="openPauseModal()">⏸</button>
                <div id="turn-order" class="turn-order"></div>
                <div class="element-triangle-top">
                    <div style="font-size: 10px; margin-bottom: 10px; color: #aaa; text-transform: uppercase; letter-spacing: 1px;">Element Counters</div>
                    <div style="position: relative; width: 140px; height: 110px; margin: 0 auto;">
                        <div style="position: absolute; top: 0; left: 50%; transform: translateX(-50%); color: var(--beast); font-weight: bold; text-shadow: 0 0 5px rgba(0,0,0,0.8);">Beast</div>
                        <div style="position: absolute; bottom: 10px; right: 10px; color: var(--nature); font-weight: bold; text-shadow: 0 0 5px rgba(0,0,0,0.8);">Nature</div>
                        <div style="position: absolute; bottom: 10px; left: 10px; color: var(--mech); font-weight: bold; text-shadow: 0 0 5px rgba(0,0,0,0.8);">Mech</div>
                        
                        <div style="position: absolute; top: 35px; right: 25px; color: #888; font-size: 20px; font-weight: bold;">↘</div>
                        <div style="position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); color: #888; font-size: 20px; font-weight: bold;">←</div>
                        <div style="position: absolute; top: 35px; left: 25px; color: #888; font-size: 20px; font-weight: bold;">↗</div>
                    </div>
                </div>
            </div>
            <div class="combat-arena">
                <div id="player-team" class="team"></div>
                <div id="enemy-team" class="team"></div>
            </div>
            <div class="combat-controls">
                <div id="combat-log" class="combat-log"></div>
                <div class="moves-wrapper" style="flex: 1; display: flex; flex-direction: column; height: 100%;">
                    <div id="active-unit-info" style="font-size:14px; font-weight:bold; margin-bottom: 10px; color: #fff;"></div>
                    <div id="move-controls" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; flex: 1;"></div>
                </div>
                <div class="controls-right" style="width: 150px; display: flex; flex-direction: column; gap: 10px; height: 100%;">
                    <div id="energy-display" class="energy-display">EN: 0</div>
                    <button id="btn-end-turn" onclick="advanceTurn()" style="flex: 1; background: #d97706; border: none; font-size: 20px; cursor: pointer; border-radius: 8px; font-weight: bold; color: white;">END TURN</button>
                </div>
            </div>
        </div>

        <!-- Merge -->
        <div id="screen-merge" class="screen">
            <h2>THE LAB MERGE</h2>
            <p style="text-align: center; font-size: 14px;">Select two monsters to merge.</p>
            <div class="merge-arena">
                <div id="merge-slot-0" class="merge-slot" onclick="openMergeModal(0)">+</div>
                <div class="merge-plus">+</div>
                <div id="merge-slot-1" class="merge-slot" onclick="openMergeModal(1)">+</div>
            </div>
            <div id="merge-result" style="margin-top: 20px; text-align: center; font-weight: bold;"></div>
            <button id="btn-do-merge" disabled onclick="executeMerge()">MERGE</button>
            <button onclick="finishMerge()">SKIP / FINISH</button>
        </div>

        <!-- Modals -->
        <div id="modal-pause" class="modal">
            <div class="modal-content">
                <h3 style="margin-top:0">PAUSE MENU</h3>
                <div style="display: flex; flex-direction: column; gap: 10px;">
                    <button onclick="closeModal('modal-pause')">RESUME</button>
                    <button onclick="abandonRun()" style="background: #d32f2f;">ABANDON RUN</button>
                </div>
            </div>
        </div>

        <div id="modal-selection" class="modal">
            <div class="modal-content">
                <h3 id="modal-title">Select Monster</h3>
                <div id="modal-list" style="max-height: 300px; overflow-y: auto;"></div>
                <button id="modal-selection-close-btn" onclick="closeModal('modal-selection')" style="width:100%">CLOSE</button>
            </div>
        </div>

        <div id="modal-notification" class="modal">
            <div class="modal-content">
                <h3 id="notif-title">Notice</h3>
                <p id="notif-message"></p>
                <button onclick="closeModal('modal-notification')" style="width:100%">OK</button>
            </div>
        </div>

        <div id="modal-confirm" class="modal">
            <div class="modal-content">
                <h3 id="confirm-title">Confirm</h3>
                <p id="confirm-message"></p>
                <div class="confirm-btns">
                    <button id="confirm-yes">YES</button>
                    <button id="confirm-no">NO</button>
                </div>
            </div>
        </div>
    </div>

        <script src="/src/data.js"></script>
    <script src="/src/state.js"></script>
    <script src="/src/core.js"></script>
    <script src="/src/collection.js"></script>
    <script src="/src/selection.js"></script>
    <script src="/src/map.js"></script>
    <script src="/src/combat.js"></script>
    <script src="/src/merge.js"></script>
    <script src="/src/pause.js"></script>

</body>
</html>
